# Release automation (Changesets):
#   1. Pending changesets on main  → maintains a "chore: version packages" PR.
#   2. Version PR merged           → publishes create-groot to npm (OIDC trusted publishing,
#      provenance automatic), tags create-groot@X.Y.Z, creates the GitHub Release.
#   3. binaries job                → compiles the standalone `groot` binary for 5 platforms,
#      generates SHA256SUMS.txt and an SPDX SBOM, signs build-provenance attestations
#      for every artifact (Sigstore, via GitHub's attestation store), and attaches
#      everything to that release. Verify: gh attestation verify <asset> --repo bloxy-studios/groot
#
# npm auth: trusted publishing (no token) — configured at npmjs.com for this repo + this
# workflow filename. Requires npm ≥ 11.5.1, hence the Node 24 setup. See docs/maintainers.md.
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version or publish
    if: github.repository == 'bloxy-studios/groot'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push version commit + tags, create GitHub Releases
      pull-requests: write # open/update the version packages PR
      id-token: write # npm trusted publishing (OIDC)
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      published-packages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history for changelog generation

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Setup Node 24 (npm ≥ 11.5.1 for trusted publishing)
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create version PR or publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: bun run version-packages
          publish: bun run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  binaries:
    name: Build & attach binaries
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload release assets
      id-token: write # Sigstore signing for build-provenance attestations
      attestations: write # persist attestations to the repo's attestation store
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile groot for all platforms
        working-directory: packages/cli
        run: |
          set -euo pipefail
          mkdir -p dist/release
          for target in linux-x64 linux-arm64 darwin-x64 darwin-arm64 windows-x64; do
            echo "→ bun-${target}"
            bun build --compile --minify --sourcemap src/index.ts \
              --target="bun-${target}" --outfile "dist/release/groot-${target}"
          done
          # --sourcemap embeds the map inside each binary; drop the stray external
          # bundler artifact so it never ships as a release asset.
          rm -f dist/release/*.map
          ls -l dist/release

      - name: Generate checksums
        working-directory: packages/cli/dist/release
        run: |
          set -euo pipefail
          sha256sum groot-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # Source-level SBOM of the workspace (bun install already ran, so the
      # full dependency tree is on disk for syft to catalog).
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: packages/cli/dist/release/groot-sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false # attached below, together with the binaries

      # Signed, verifiable provenance for every release artifact:
      #   gh attestation verify groot-linux-x64 --repo bloxy-studios/groot
      - name: Attest build provenance (binaries, checksums, SBOM)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            packages/cli/dist/release/groot-*
            packages/cli/dist/release/SHA256SUMS.txt

      - name: Attach binaries to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          # Passed via env (not inline interpolation) to keep run scripts injection-safe.
          PUBLISHED_PACKAGES: ${{ needs.release.outputs.published-packages }}
        run: |
          set -euo pipefail
          version="$(jq -r '.[] | select(.name == "create-groot") | .version' <<< "$PUBLISHED_PACKAGES")"
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "create-groot was not part of this publish; nothing to attach."
            exit 0
          fi
          tag="create-groot@${version}"
          echo "Uploading assets to release ${tag}"
          gh release upload "$tag" packages/cli/dist/release/* --clobber
