# Full-pipeline E2E: runs the REAL upstream generators (create-turbo, create-next-app,
# sv, create-hono) plus groot's direct-write scaffolds, stitches, and installs the
# result. Network-dependent and slower than CI, so it lives in its own workflow.
#
# The weekly cron doubles as upstream drift detection (docs/roadmap.md v0.4): when a
# generator changes flags or output shape, this goes red before any user hits it.
# Intentionally NOT a required status check yet — upstream registries can flake;
# promote it in the ruleset once it has a stable track record.
name: E2E scaffolds

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "41 5 * * 3" # Wednesdays 05:41 UTC — upstream drift watch
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  e2e:
    name: E2E scaffolds (real generators)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run full-pipeline E2E
        working-directory: packages/cli
        env:
          GROOT_E2E: "1"
        run: bun test generate.e2e
